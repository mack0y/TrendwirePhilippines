name: Generate Sitemap

on:
  workflow_dispatch:
  schedule:
    # Daily at 3AM PHT (7PM UTC)
    - cron: '0 19 * * *'

jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate sitemap.xml
        run: |
          BASE_URL="https://mack0y.github.io/TrendwirePhilippines"
          cat > sitemap.xml << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url>
              <loc>${BASE_URL}/</loc>
              <changefreq>daily</changefreq>
              <priority>1.0</priority>
            </url>
          </urlset>
          EOF

      - name: Commit sitemap.xml to main branch
        run: |
          git config user.name "TrendWire Bot"
          git config user.email "bot@trendwire.ph"
          git add sitemap.xml
          git diff --staged --quiet || git commit -m "Update sitemap.xml [automated]"
          git push origin main
