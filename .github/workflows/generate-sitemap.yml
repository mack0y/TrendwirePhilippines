name: 🔍 Generate Sitemap & Feed

on:
  workflow_dispatch:
  schedule:
    # Daily at 3AM PHT (7PM UTC)
    - cron: '0 19 * * *'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install supabase

      - name: Generate sitemap.xml
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SITE_URL: https://mack0y.github.io/TrendwirePhilippines
        run: python scripts/generate-sitemap.py

      - name: Generate feed.xml
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SITE_URL: https://mack0y.github.io/TrendwirePhilippines
        run: python scripts/generate-feed.py

      - name: Commit SEO assets
        run: |
          git config user.name "TrendWire Bot"
          git config user.email "bot@trendwire.ph"
          git add sitemap.xml feed.xml
          git diff --staged --quiet || (
            git commit -m "🔍 Update sitemap.xml and feed.xml [automated]"
            git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/mack0y/TrendwirePhilippines.git main
          )
