name: Auto-Post to Facebook
on:
  schedule:
    # Every 4 hours — check for newly published articles and post to Facebook
    - cron: '0 */4 * * *'
  workflow_dispatch:  # Manual trigger too

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: pip install supabase requests

      - name: Post latest unpublished article to Facebook
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SITE_URL:             ${{ secrets.SITE_URL || 'https://mack0y.github.io/TrendwirePhilippines' }}
          # Facebook Page Access Token (get from: https://developers.facebook.com/apps)
          # Required scopes: pages_manage_posts, pages_read_engagement
          FB_PAGE_ID:           ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN:      ${{ secrets.FB_ACCESS_TOKEN }}
        run: |
          python scripts/post-to-facebook.py
