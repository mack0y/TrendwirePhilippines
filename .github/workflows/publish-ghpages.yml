name: 📤 Publish Trend Article to GitHub Pages

on:
  push:
    branches: [ main ]          # automatic on push
  workflow_dispatch:           # manual trigger if you need

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'   # opt‑in to Node 24 now

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase

      - name: Run publish-article.py
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
        run: |
          python scripts/publish-article.py --latest

      - name: Generate pre-rendered article pages + sitemap
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SITE_URL:             ${{ secrets.SITE_URL || 'https://mack0y.github.io/TrendwirePhilippines' }}
        run: |
          python scripts/generate-article-pages.py
          python scripts/generate-sitemap.py

      - name: Commit & push changes
        run: |
          git config user.name "mack0y"
          git config user.email "mackoysemailadd@gmail.com"
          git add -A
          git diff --staged --quiet || (
            git commit -m "📢 Publish latest trend article"
            git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git main
          )
